server:
    port: 8080   # Port where this service runs

spring:
    application:
        name: customer   # Service name (used to register in Eureka)

    datasource:
        url: jdbc:postgresql://localhost:5432/customer
        username: amigoscode
        password: password

    jpa:
        hibernate:
            ddl-auto: create-drop   # Create schema on start, drop on shutdown (dev only)
        properties:
            hibernate:
                dialect: org.hibernate.dialect.PostgreSQLDialect  # PostgreSQL dialect
                format_sql: true                                  # Pretty print SQL
        show-sql: true   # Log SQL queries to console

    zipkin:
        base-url: http://localhost:9411   # Distributed tracing server

    rabbitmq:
        addresses: localhost:5672   # RabbitMQ broker address (for messaging)

    profiles:
        active: default

# Springdoc OpenAPI Configuration
springdoc:
    api-docs:
        path: /v3/api-docs
        enabled: true
    swagger-ui:
        path: /swagger-ui.html
        enabled: true
        operations-sorter: method
        tags-sorter: alpha
    use-management-port: false

eureka:
    client:
        service-url:
            defaultZone: http://localhost:8761/eureka   # Eureka Server URL

        fetch-registry: true        # Fetch list of services from Eureka
        register-with-eureka: true  # Register this service to Eureka
        enabled: true               # Enable Eureka client